name: Scheduled NPS NAV Daily Fetch
on:
  schedule:
    # Runs at 11:00 AM IST every day, actions run on UTC
    # Note: While SEBI mandates PFMs publish by 10 AM IST, NPS Trust aggregates
    # data from all PFMs before updating their site. Kept at 11 AM to ensure
    # NPS Trust has completed aggregation and published the data.
    - cron: '30 05 * * *'
    # Runs at 3:00 PM IST every day, actions run on UTC
    # Mid-day fetch to catch any corrections or late updates after morning publish
    - cron: '30 09 * * *'
    # Runs at 11:00 PM IST every day, actions run on UTC
    # Catches domestic instrument NAVs published by end of day
    - cron: '30 17 * * *'
  workflow_dispatch:  # Enables manual triggering
jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run fetch.py
      id: fetch
      run: python scripts/fetch.py
      continue-on-error: true

    - name: Create issue if both NAV sources failed
      if: steps.fetch.outcome == 'failure'
      uses: actions/github-script@v9
      with:
        script: |
          const now = new Date().toISOString();
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 NAV fetch failed — both Protean and NPS Trust unavailable (${now.slice(0,10)})`,
            labels: ['bug'],
            body: `Both NAV data sources returned no data during the scheduled fetch.\n\n**Run:** ${context.runId}\n**Time:** ${now}\n\nPlease check:\n- https://www.npscra.proteantech.in (Protean ZIP endpoint)\n- https://npstrust.org.in/nav-report-excel (NPS Trust full dump)\n\nIf both are temporarily down, the next scheduled fetch will retry automatically.`
          });

    - name: Fail job if fetch failed
      if: steps.fetch.outcome == 'failure'
      run: exit 1
      
    - name: Run nifty.py
      env:
        NIFTY_ENDPOINT_URL: ${{ secrets.NIFTY_ENDPOINT_URL }}
      run: python scripts/nifty.py
      continue-on-error: true  # Allow the workflow to continue even if nifty.py fails
      
    - name: Run update_db.py
      env:
        AUTH_TOKEN_NPSNAV_DBWORKER: ${{ secrets.AUTH_TOKEN_NPSNAV_DBWORKER }}
      run: python scripts/update_db.py
      continue-on-error: true  # Allow the workflow to continue even if update_db.py fails
      
    - name: Commit and Push Changes
      run: |
        git config --global user.name "DailyUpdateBot"
        git config --global user.email "bot@npsnav.in"
        
        # Show what changed
        echo "Git status before adding:"
        git status
        
        # Force add the normally-ignored SM*.json files
        git add --force data/SM*.json
        
        # Add the normally-tracked files
        git add data/data.json data/nifty.json data/changelog.json
        
        # Show what will be committed
        echo "Files staged for commit:"
        git diff --staged --name-only
        
        # Commit and push
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Daily NAV update - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}